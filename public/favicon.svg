<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>
    
    <!-- Paper Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    
    <!-- Gold Gradient for Pen/Accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <!-- Document Sheet -->
  <path d="M150 140C150 128.954 158.954 120 170 120H300L362 182V372C362 383.046 353.046 392 342 392H170C158.954 392 150 383.046 150 372V140Z" fill="white" filter="url(#shadow)" />
  
  <!-- Folded Corner -->
  <path d="M300 120V170C300 176.627 305.373 182 312 182H362L300 120Z" fill="#E2E8F0" />
  
  <!-- Text BLP inside document -->
  <text x="180" y="240" font-family="'Inter', sans-serif" font-weight="900" font-size="46" fill="#1E3A8A" letter-spacing="1">BLP</text>
  <text x="180" y="285" font-family="'Inter', sans-serif" font-weight="700" font-size="26" fill="#3B82F6" letter-spacing="2">SIGN</text>

  <!-- Signature Stroke / Pen Path -->
  <path d="M175 335 C 220 340, 245 315, 275 328 C 305 342, 320 325, 345 315" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Nib Icon -->
  <path d="M345 315 L335 300 L350 295 L345 315 Z" fill="url(#goldGrad)" />
</svg>
